version: "3.8"

services:
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ:-America/Toronto}
    ports:
      - "${FLARESOLVERR_PORT:-8191}:8191"
    # Wait for the HTTP server to actually accept connections before
    # p-streamrec starts. Without this, p-streamrec races FlareSolverr's
    # startup and logs "not available" even though it recovers moments later.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8191/health"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 15s
    restart: unless-stopped

  p-streamrec:
    image: ghcr.io/raccommode/p-streamrec:latest
    container_name: p-streamrec
    depends_on:
      flaresolverr:
        condition: service_healthy
    environment:
      - OUTPUT_DIR=/data
      - PORT=${PORT:-8080}
      - FFMPEG_PATH=ffmpeg
      - HLS_TIME=${HLS_TIME:-4}
      - HLS_LIST_SIZE=${HLS_LIST_SIZE:-6}
      - CB_RESOLVER_ENABLED=${CB_RESOLVER_ENABLED:-true}
      - AUTO_RECORD_USERS=${AUTO_RECORD_USERS:-}
      # - CB_COOKIE=session=...; autre=...   # Optionnel
      - PASSWORD=${PASSWORD:-}
      - TZ=${TZ:-America/Toronto}
      # Chaturbate Authentication
      - CHATURBATE_USERNAME=${CHATURBATE_USERNAME:-}
      - CHATURBATE_PASSWORD=${CHATURBATE_PASSWORD:-}
      # FlareSolverr
      - FLARESOLVERR_URL=${FLARESOLVERR_URL:-http://flaresolverr:8191}
    ports:
      - "${HOST_PORT:-8080}:${PORT:-8080}"
    volumes:
      - ${HOST_DATA_DIR:-./data}:/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
